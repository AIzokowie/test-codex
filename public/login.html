<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Logowanie</title>
<link rel="stylesheet" href="style.css">
<script src="app.js"></script>
</head>
<body onload="logout()">
<header>
  <nav>
    <a href="/">Home</a>
    <a href="/register.html">Rejestracja</a>
  </nav>
</header>

    <button>Zaloguj</button>
  </form>
</div>
</body>
</html>
